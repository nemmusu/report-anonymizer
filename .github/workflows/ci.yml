name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }} · py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install system Qt deps (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-sync1 libxcb-xfixes0 libxcb-xinerama0 \
            libxcb-xkb1 libdbus-1-3 fonts-liberation \
            poppler-utils

      - name: Install (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check anonymize gui tests || true

      - name: Run pytest (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          QT_QPA_PLATFORM: offscreen
          ANONYMIZE_SKIP_WIZARD: "1"
        run: pytest -ra --maxfail=5

      - name: Run pytest (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
          ANONYMIZE_SKIP_WIZARD: "1"
        # ``--basetemp`` keeps pytest's tmp dir inside the workspace
        # so we don't trip over the Windows runner's restricted
        # %TEMP% (some boards return Access Denied when pytest tries
        # to write under C:\Users\runneradmin\AppData\Local\Temp).
        run: pytest -ra --maxfail=5 --basetemp=.pytest_tmp

      - name: Self-test
        if: runner.os != 'Windows'
        env:
          ANONYMIZE_SKIP_WIZARD: "1"
        run: python bin/anonymize-dossier selftest || true
